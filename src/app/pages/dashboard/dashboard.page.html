<section class="page">
  <div class="container">
    <header class="page-header">
      <h1>Dashboard</h1>
      <p>Select a specialty to view surgeons and preference cards.</p>
    </header>

    <div class="grid">
      <mat-card class="card" *ngFor="let s of specialties" (click)="openSpecialty(s)">
        <div class="card-inner">
          <mat-icon class="icon">{{ s.icon }}</mat-icon>
          <div class="title">{{ s.name }}</div>
        </div>
      </mat-card>
    </div>
  </div>
</section>
