<section class="page">
  <div class="container">
    <header class="page-header">
      <h1>{{ title }}</h1>
      <p>{{ subtitle }}</p>

      <div class="actions">
        <button mat-stroked-button (click)="back()">Back</button>

        <button mat-stroked-button (click)="toggleManage()">
          <mat-icon>settings</mat-icon>
          <span>{{ manageMode ? 'Done' : 'Manage' }}</span>
        </button>
      </div>
    </header>

    <div class="grid">
      <mat-card class="card" *ngFor="let p of procedures" (click)="openProcedure(p)">
        <div class="card-inner">
          <div class="title">{{ p.name }}</div>

          <!-- Only show context subtitle when viewing /procedures -->
          <div class="subtitle" *ngIf="!(specialtyId && surgeonId)">
            {{ p.surgeonName }} • {{ p.specialtyName }}
          </div>

          <!-- ✅ QUICK CREATE button when there is NO preference card yet -->
          <button
            class="quick-card-btn"
            mat-icon-button
            *ngIf="!p.hasCard"
            (click)="quickAddCard(p, $event)"
            aria-label="Create preference card"
          >
            <mat-icon>note_add</mat-icon>
          </button>
        </div>
      </mat-card>

      <mat-card class="card empty" *ngIf="procedures.length === 0">
        <div class="card-inner">
          <div class="title">No procedures yet</div>
        </div>
      </mat-card>
    </div>
  </div>
</section>
