<section class="page">
  <header class="page-header">
    <div>
      <h1>{{ surgeonName }}</h1>
      <p>{{ specialtyName }} • Choose a procedure.</p>
    </div>

    <button mat-stroked-button (click)="back()">Back</button>
  </header>

  <div class="grid">
    <mat-card class="card" *ngFor="let p of procedures" (click)="openProcedure(p)">
      <mat-card-title>{{ p.name }}</mat-card-title>
      <mat-card-subtitle>Tap to view preference card</mat-card-subtitle>
    </mat-card>

    <mat-card class="empty" *ngIf="procedures.length === 0">
      <mat-card-title>No procedures found</mat-card-title>
      <mat-card-subtitle>Add some to your data source</mat-card-subtitle>
    </mat-card>
  </div>
</section>
